  <div id="footer-container"></div>

  <!-- Cookie Banner -->
  <div id="cookieBanner" class="hidden flex flex-col sm:flex-row justify-between items-center text-gray-800">
    <p class="text-sm text-center sm:text-left mb-3 sm:mb-0">
      This website stores cookies on your computer. To find out more, see our
      <a href="#" class="text-orange-500 font-semibold hover:underline">Privacy Policy</a>.
    </p>
    <div class="flex gap-3">
      <button id="declineCookies" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-sm">
        Decline
      </button>
      <button id="acceptCookies" class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm">
        Accept
      </button>
    </div>
  </div>

  <button id="scrollTopBtn" class="hidden">

  </button>

  <script src="../Assets/Script/gallery-lightbox.js"></script>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-sm">
    <button id="lightbox-close" class="absolute top-6 right-6 text-white/70 hover:text-white transition transform hover:scale-110 z-10">
      <i class="fas fa-times text-4xl drop-shadow-lg"></i>
    </button>
    <button id="lightbox-prev" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white transition transform hover:scale-110 z-10 p-4">
      <i class="fas fa-chevron-left text-5xl drop-shadow-lg"></i>
    </button>
    <button id="lightbox-next" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white transition transform hover:scale-110 z-10 p-4">

    <div class="w-full max-w-5xl px-12 md:px-20 h-auto max-h-[90vh] flex justify-center items-center relative">
