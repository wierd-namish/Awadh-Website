<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos Gallery | Awadh Aviation Academy</title>
  <meta name="description" content="Watch training videos, drone flight tests, and aircraft mechanical workshop tours at Awadh Aviation Academy.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="../Assets/Styles/style.css">
  <link rel="stylesheet" href="../Assets/Styles/responsive.css">
</head>
<body class="m-0 p-0 no-scroll bg-white">

  <div id="preloader-container"></div>
  <div id="header-container"></div>

  <!-- Breadcrumb -->
  <section class="bg-gray-100 pt-36 pb-6 px-6 md:px-14 border-b">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
      <div>
        <h1 class="text-4xl font-extrabold text-gray-800">Videos Gallery</h1>
        <p class="text-gray-500 text-sm mt-1">Watch flight demonstrations, lab workshops, and campus activities.</p>
      </div>
      <div class="mt-4 md:mt-0 text-sm font-semibold text-gray-500">
        <a href="../index.html" class="hover:text-[#5d58ef] transition">Home</a>
        <span class="mx-2">/</span>
        <span class="text-[#ff4301]">Gallery</span>
        <span class="mx-2">/</span>
        <span class="text-gray-700">Videos</span>
      </div>
    </div>
  </section>

  <!-- Video Grid Section -->
  <section class="pt-10 pb-20 px-6 md:px-12 bg-white">
    <div class="max-w-7xl mx-auto">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
        <!-- Video Card 1 -->
        <div class="group overflow-hidden rounded-3xl shadow-md border hover:shadow-2xl transition duration-500 bg-white">
          <div class="h-64 overflow-hidden relative flex items-center justify-center bg-black">
            <video class="w-full h-full object-contain" controls preload="metadata">
              <source src="../Assets/Images/VID-20220322-WA0005.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="p-6 bg-white text-center">
            <h4 class="font-bold text-gray-800 text-lg">VT-VVY(Turbo)</h4>
          </div>
        </div>

        <!-- Video Card 2 -->
        <div class="group overflow-hidden rounded-3xl shadow-md border hover:shadow-2xl transition duration-500 bg-white">
          <div class="h-64 overflow-hidden relative flex items-center justify-center bg-black">
            <video class="w-full h-full object-contain" controls preload="metadata">
              <source src="../Assets/Images/VID-20220405-WA0002.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="p-6 bg-white text-center">
            <h4 class="font-bold text-gray-800 text-lg">VT-BJP</h4>
          </div>
        </div>

        <!-- Video Card 3 -->
        <div class="group overflow-hidden rounded-3xl shadow-md border hover:shadow-2xl transition duration-500 bg-white">
          <div class="h-64 overflow-hidden relative flex items-center justify-center bg-black">
            <video class="w-full h-full object-contain" controls preload="metadata">
              <source src="../Assets/Images/VID-20231125-WA0016.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="p-6 bg-white text-center">
            <h4 class="font-bold text-gray-800 text-lg">Landing Gear Extension & Retraction</h4>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- Cookie Banner -->
  <div id="cookieBanner" class="hidden flex flex-col sm:flex-row justify-between items-center text-gray-800">
    <p class="text-sm text-center sm:text-left mb-3 sm:mb-0">
      This website stores cookies on your computer. To find out more, see our
      <a href="#" class="text-orange-500 font-semibold hover:underline">Privacy Policy</a>.
    </p>
    <div class="flex gap-3">
      <button id="declineCookies" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-sm">
        Decline
      </button>
      <button id="acceptCookies" class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm">
        Accept
      </button>
    </div>
  </div>

  <button id="scrollTopBtn" class="hidden">
    <i class="fas fa-arrow-up text-xl"></i>
  </button>

  <script src="../Assets/Script/components.js?v=4"></script>
  <script src="../Assets/Script/preloader.js?v=4"></script>
  <script src="../Assets/Script/scroll.js?v=4"></script>
  <script src="../Assets/Script/video.js?v=4"></script>
  <script src="../Assets/Script/cookie.js?v=4"></script>
  <script src="../Assets/Script/script.js?v=4"></script>
</body>
</html>
